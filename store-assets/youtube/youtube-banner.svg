<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#020617"/>
      <stop offset="0.55" stop-color="#061226"/>
      <stop offset="1"   stop-color="#0a1f3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="wglow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22d3ee" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="2560" height="1440" fill="url(#bg)"/>
  <ellipse cx="1280" cy="720" rx="820" ry="360" fill="url(#glow)"/>

  <!-- faint oversized wave watermark filling the wide side areas -->
  <g opacity="0.09" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(-200,-150) scale(42)">
      <path d="M2 12c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
    </g>
    <g transform="translate(-200,560) scale(42)">
      <path d="M2 12c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
    </g>
  </g>

  <!-- centered lockup, sized to sit inside the 1546x423 safe area with margin -->
  <g text-anchor="middle" fill="#ffffff">
    <g transform="translate(1172,455) scale(9)" fill="none" stroke="#22d3ee" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round" filter="url(#wglow)">
      <path d="M2 12c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
      <path d="M2 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
    </g>
    <text x="1280" y="770" font-family="Avenir Next, Helvetica Neue, sans-serif" font-weight="800"
          font-size="150" letter-spacing="2">pumpfoil<tspan fill="#22d3ee">.org</tspan></text>
    <text x="1280" y="828" font-family="Avenir Next, Helvetica Neue, sans-serif" font-weight="600"
          font-size="46" fill="#cbd5e1" letter-spacing="14">TRACK EVERY PUMP</text>
    <text x="1280" y="880" font-family="Avenir Next, Helvetica Neue, sans-serif" font-weight="700"
          font-size="32" fill="#22d3ee" letter-spacing="8">GARMIN · WEAR OS · APPLE WATCH</text>
  </g>
