name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hinweis: Die Garmin-Watch-App (watch/, Monkey C) wird hier NICHT gebaut — das Connect-IQ-SDK
# + die Device-Files sind proprietär (Garmin-Login) und liegen nicht im Repo. Lokal:
# `cd watch && SDK_HOME=… ./build-all.sh`.

jobs:
  server:
    name: Server (pytest, Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foil
          POSTGRES_PASSWORD: foil
          POSTGRES_DB: foil_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U foil"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Tests laufen gegen Postgres (wie Prod), nicht SQLite — wegwerfbarer Container.
      TEST_DATABASE_URL: postgresql+psycopg://foil:foil@localhost:5432/foil_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # [ml] = scipy/scikit-learn/pandas — die Detektions-/ML-Tests brauchen sklearn.
      - run: pip install -e ".[dev,ml]"
      - run: pytest -q

  web:
    name: Web (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  android:
    name: Android (:app + :wear compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:compileDebugKotlin :wear:compileDebugKotlin --no-daemon --stacktrace
