name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Hinweis: Die Garmin-Watch-App (watch/, Monkey C) wird hier NICHT gebaut — das Connect-IQ-SDK
# + die Device-Files sind proprietär (Garmin-Login) und liegen nicht im Repo. Lokal:
# `cd watch && SDK_HOME=… ./build-all.sh`.

jobs:
  server:
    name: Server (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      # Ohne DATABASE_URL läuft die Test-Suite gegen die SQLite-Dev-Fallback-DB.
      - run: pytest -q

  web:
    name: Web (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  android:
    name: Android (:app + :wear compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:compileDebugKotlin :wear:compileDebugKotlin --no-daemon --stacktrace
