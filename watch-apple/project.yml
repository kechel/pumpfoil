# XcodeGen-Projekt für die Apple-Watch-Recorder-App.
# Erzeugen:  brew install xcodegen && cd watch-apple && xcodegen generate && open Pumpfoil.xcodeproj
name: Pumpfoil
options:
  bundleIdPrefix: org.pumpfoil
  deploymentTarget:
    watchOS: "9.0"
  createIntermediateGroups: true

targets:
  PumpfoilWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pumpfoil.coolwatch
        PRODUCT_NAME: Pumpfoil
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"   # 4 = Apple Watch
        # DEVELOPMENT_TEAM: XXXXXXXXXX   # <- in Xcode unter Signing & Capabilities setzen
    info:
      path: Sources/Info.plist
      properties:
        WKApplication: true
        WKWatchOnly: true        # eigenständige Watch-App ohne iPhone-Companion
        CFBundleDisplayName: Pumpfoil
        # Version/Build HART ins Info.plist (nicht via $(MARKETING_VERSION) — die
        # Substitution wurde beim Archivieren nicht aufgelöst -> Organizer ohne Version).
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        # Export-Compliance: App nutzt nur Standard-HTTPS/TLS (ausgenommene Verschlüsselung).
        # false beantwortet die App-Store-Connect-Abfrage automatisch -> kein Upload nötig.
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "GPS-Track deiner Pump-Foiling-Session."
        NSMotionUsageDescription: "Beschleunigungsdaten zur Pump-/Gleit-Erkennung."
        NSHealthShareUsageDescription: "Herzfrequenz während der Session."
        NSHealthUpdateUsageDescription: "Session als Workout aufzeichnen."
        WKBackgroundModes:
          - workout-processing
    entitlements:
      path: Sources/Pumpfoil.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
