# XcodeGen-Projekt: native iOS-App (Pumpfoil) + eingebettete Apple-Watch-App.
# Erzeugen:  brew install xcodegen && cd watch-apple && xcodegen generate && open Pumpfoil.xcodeproj
#
# Die iOS-App bettet die Watch-App ein -> das Archiv ist ein iOS-App-Archiv und
# bietet im Organizer „Distribute -> App Store Connect" (das löste das watch-only-Problem).
name: Pumpfoil
options:
  bundleIdPrefix: org.pumpfoil
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true

targets:
  # --- iOS-App (nativer SwiftUI-Port der PWA) ---
  Pumpfoil:
    type: application
    platform: iOS
    sources:
      - path: Sources-iOS
    dependencies:
      - target: PumpfoilWatch
        embed: true                  # Watch-App in die iOS-App einbetten
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pumpfoil.coolwatch
        PRODUCT_NAME: Pumpfoil
        MARKETING_VERSION: "1.1.16"
        CURRENT_PROJECT_VERSION: "20"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
        # Pro Datei kompilieren statt Whole-Module: der Release-Build hing minutenlang in der
        # WMO-Optimierung (alle 28 Dateien als ein Block). Per-File baut zuverlässig schnell durch;
        # der Type-Check selbst ist gesund (max ~450 ms). Laufzeit-Unterschied für diese App
        # vernachlässigbar (keine cross-module Inlining-kritischen Hot-Paths).
        SWIFT_COMPILATION_MODE: singlefile
        # Type-Checker-Diagnose: Xcode meldet als WARNUNG jeden Ausdruck/Funktionskörper, der
        # länger als 150 ms zum Type-Checken braucht (nennt Datei:Zeile). So findet man die eine
        # explodierende SwiftUI-Zeile, die das Archive „ewig" hängen lässt, statt zu raten.
        # Nur Diagnose (kein Build-Fehler); Schwelle bei Bedarf senken (z. B. 80).
        OTHER_SWIFT_FLAGS: "-Xfrontend -warn-long-expression-type-checking=150 -Xfrontend -warn-long-function-bodies=150"
        TARGETED_DEVICE_FAMILY: "1"   # nur iPhone (Portrait-Port; iPad-Multitasking-Orientierungen entfallen)
        DEVELOPMENT_TEAM: MEKT477FXE       # SmartKomm GmbH (Team-ID, = exportOptions.plist) -> Team nach xcodegen automatisch gesetzt
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources-iOS/Info.plist
      properties:
        CFBundleDisplayName: Pumpfoil
        CFBundleShortVersionString: "1.1.16"
        CFBundleVersion: "20"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Zeigt deine Foil-Spots und Sessions in deiner Nähe auf der Karte."
        NSMicrophoneUsageDescription: "Zum Diktieren von Chat-Nachrichten per Sprache."
        NSSpeechRecognitionUsageDescription: "Wandelt deine gesprochenen Chat-Nachrichten in Text um."
        # „Record on Phone" (Beta): Hintergrund-Aufnahme GPS + Bewegung.
        NSLocationAlwaysAndWhenInUseUsageDescription: "Zeichnet den GPS-Track deiner Session auf — auch im Hintergrund, wenn das Handy in der Tasche ist."
        NSMotionUsageDescription: "Beschleunigungsdaten zur Pump-/Gleit-Erkennung während der Aufnahme."
        UIBackgroundModes:
          - location
    entitlements:
      path: Sources-iOS/Pumpfoil.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default

  # --- Apple-Watch-Recorder (eingebettet, kein WKWatchOnly mehr) ---
  PumpfoilWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.pumpfoil.coolwatch.watchkitapp
        PRODUCT_NAME: Pumpfoil
        MARKETING_VERSION: "1.1.16"
        CURRENT_PROJECT_VERSION: "20"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        # Wie beim iOS-Target: per-file statt WMO (WMO hing im Release/Archive) + Type-Check-Diagnose.
        SWIFT_COMPILATION_MODE: singlefile
        OTHER_SWIFT_FLAGS: "-Xfrontend -warn-long-expression-type-checking=150 -Xfrontend -warn-long-function-bodies=150"
        TARGETED_DEVICE_FAMILY: "4"   # 4 = Apple Watch
        DEVELOPMENT_TEAM: MEKT477FXE       # SmartKomm GmbH — Team nach xcodegen automatisch gesetzt
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: org.pumpfoil.coolwatch   # iOS-Companion
        CFBundleDisplayName: Pumpfoil
        CFBundleShortVersionString: "1.1.16"
        CFBundleVersion: "20"
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "GPS-Track deiner Pump-Foiling-Session."
        NSMotionUsageDescription: "Beschleunigungsdaten zur Pump-/Gleit-Erkennung."
        NSHealthShareUsageDescription: "Herzfrequenz während der Session."
        NSHealthUpdateUsageDescription: "Session als Workout aufzeichnen."
        WKBackgroundModes:
          - workout-processing
    entitlements:
      path: Sources/Pumpfoil.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
