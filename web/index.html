<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020617" />
    <meta
      name="description"
      content="Pumpfoil zeichnet deine Pump-Foiling-Sessions mit der Garmin-Uhr auf und wertet sie automatisch aus: GPS-Track, Foiling-Distanz, Pump-Frequenz und Gleitphasen."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pumpfoil — Pump-Foiling aufzeichnen und auswerten" />
    <meta
      property="og:description"
      content="Verbinde deine Garmin-Uhr und werte jede Pump-Foiling-Session aus: GPS-Track, Foiling-Distanz, Pump-Frequenz und Gleitphasen."
    />
    <meta property="og:image" content="/oauth-logo-512.png" />
    <meta property="og:url" content="https://pumpfoil.org/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pumpfoil" />
    <title>Pumpfoil</title>
  </head>
  <body>
    <script>
      // Theme früh anwenden (kein Flash). Default = auto (folgt System).
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var mode = t === "light" || t === "dark" ? t : "auto";
          var systemLight = window.matchMedia &&
            !window.matchMedia("(prefers-color-scheme: dark)").matches;
          var light = mode === "light" || (mode === "auto" && systemLight);
          if (light) {
            document.documentElement.classList.add("theme-light");
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", "#f8fafc");
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 40rem; margin: 3rem auto; padding: 0 1.25rem; font-family: system-ui, sans-serif; color: #e2e8f0; background: #020617;">
        <h1>Pumpfoil</h1>
        <p>
          Pumpfoil zeichnet deine Pump-Foiling-Sessions mit der Garmin-Uhr auf
          und wertet sie automatisch aus: GPS-Track, gefahrene Foiling-Distanz,
          Pump-Frequenz und Gleitphasen. Lege ein Konto an, verbinde deine Uhr
          und vergleiche deine Sessions über die Zeit.
        </p>
        <p>Diese Anwendung benötigt JavaScript. Bitte aktiviere es, um fortzufahren.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
