# Port 443: Reverse-Proxy auf den Garmin-Dev-Stack
#
# Liegt auf dem the reverse proxy-LoadBalancer unter /etc/apache2/sites-enabled/.
# the reverse proxy terminiert TLS (Let's-Encrypt-Zert) und proxied per HTTP auf die
# interne VM app-host:8090. Der Service dort laeuft ohne TLS.
#
# Diese Datei entsteht durch `certbot --apache` als pumpfoil.org-le-ssl.conf
# (zunaechst nur mit DocumentRoot). Danach den Proxy-Teil unten einsetzen.
# Pendant zu app-host.example-le-ssl.conf — gleiches Pattern.

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName pumpfoil.org

    ErrorLog ${APACHE_LOG_DIR}/pumpfoil-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/pumpfoil-ssl-access.log combined

    Include      /etc/letsencrypt/options-ssl-apache.conf

    # Dev-SPA — Caching aus, sonst zeigt der LB veraltete Bundles.
    Header   set Cache-Control "no-cache"

    ProxyPreserveHost On
    ProxyTimeout 120
    RequestHeader set X-Forwarded-Proto "https"

    # BasicAuth-Gate (Pre-Public). htpasswd-Datei separat anlegen:
    #   sudo htpasswd -c /etc/apache2/htpasswd-pumpfoil <user>
    #   sudo htpasswd    /etc/apache2/htpasswd-pumpfoil <name>
#    <Location />
#        AuthType Basic
#        AuthName "Garmin Development (Pre-Public)"
#        AuthUserFile /etc/apache2/htpasswd-pumpfoil
#        Require valid-user
#    </Location>

    # ACME-Challenge muss erreichbar bleiben (certbot --apache renew).
    <LocationMatch "^/\.well-known/acme-challenge/">
        Satisfy Any
        Require all granted
    </LocationMatch>

    # WebSocket-Pfade durchschleusen (mod_proxy_wstunnel) — z.B. fuer HMR.
    # Falls der Garmin-Service keine WebSockets nutzt, kann der Block weg.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://app-host:8090/$1 [P,L]

    # Restlicher Verkehr als HTTP-Reverse-Proxy auf die Backend-VM.
    ProxyPass            /  http://app-host:8090/
    ProxyPassReverse     /  http://app-host:8090/

    SSLCertificateFile    /etc/letsencrypt/live/pumpfoil.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/pumpfoil.org/privkey.pem
</VirtualHost>
</IfModule>
