# Port 80: Bootstrap fuer ACME-Challenge + Redirect auf HTTPS
#
# Liegt auf dem the reverse proxy-LoadBalancer unter /etc/apache2/sites-enabled/.
# Pendant zu app-host.example.conf — gleiches Pattern.
# Backend-Service: VM app-host, eigener Port 8090 (Garmin-Stack).
#
# Workflow:
#   sudo cp pumpfoil.org.conf /etc/apache2/sites-available/
#   sudo a2ensite pumpfoil.org
#   sudo systemctl reload apache2
#   sudo certbot --apache -d pumpfoil.org
# certbot legt das Zert unter /etc/letsencrypt/live/pumpfoil.org/ an
# und erzeugt die 443-ssl-config (siehe pumpfoil.org-le-ssl.conf).

<VirtualHost *:80>
    ServerName pumpfoil.org
    DocumentRoot /var/www/html

    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteCond %{SERVER_NAME} =pumpfoil.org
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
